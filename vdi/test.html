<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PW Auth Relay — YubiKey Test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2029;
      --border: #2a3340;
      --text: #e6edf3;
      --muted: #8b96a3;
      --accent: #5dade2;
      --accent-hover: #7bbeea;
      --ok: #4ade80;
      --err: #f87171;
      --code-bg: #0a0e13;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #0f1419 0%, #131a23 100%);
      min-height: 100vh;
      color: var(--text);
      padding: 40px 20px;
    }
    .container { max-width: 820px; margin: 0 auto; }
    header { margin-bottom: 28px; }
    h1 {
      font-size: 26px;
      font-weight: 600;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }
    .subtitle { color: var(--muted); font-size: 14px; margin: 0; }
    .subtitle code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      color: var(--accent);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 18px;
    }
    .card h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 0 0 14px;
      font-weight: 600;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; }
    button {
      font: inherit;
      font-weight: 500;
      padding: 10px 18px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #243140;
      color: var(--text);
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .05s;
    }
    button:hover:not(:disabled) {
      background: #2d3d50;
      border-color: var(--accent);
    }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.primary {
      background: var(--accent);
      color: #0a0e13;
      border-color: var(--accent);
    }
    button.primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }
    button.ghost { background: transparent; }
    pre#log {
      background: var(--code-bg);
      border: 1px solid var(--border);
      padding: 14px 16px;
      border-radius: 8px;
      overflow: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      font: 12.5px/1.45 "SF Mono", Menlo, Consolas, monospace;
      color: #c9d1d9;
      max-height: 460px;
      min-height: 200px;
      margin: 0;
    }
    .ok { color: var(--ok); }
    .err { color: var(--err); }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 24px;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔑 PW Auth Relay — YubiKey Test</h1>
      <p class="subtitle">
        Exercises the laptop YubiKey through the auth-relay extension. Origin: <code id="origin"></code>.
        Calls <code>navigator.credentials.create()</code> then <code>.get()</code> against a fake RP — no real account is at risk.
      </p>
    </header>

    <div class="card">
      <h2>Actions</h2>
      <div class="actions">
        <button id="btn-create" class="primary">1. Make credential (touch key)</button>
        <button id="btn-get" disabled>2. Get assertion (touch key)</button>
        <button id="btn-clear" class="ghost">Clear log</button>
      </div>
    </div>

    <div class="card">
      <h2>Log</h2>
      <pre id="log"></pre>
    </div>

    <footer>
      <a href="https://github.com/parallelworks/auth-relay" target="_blank" rel="noopener">parallelworks/auth-relay</a>
    </footer>
  </div>

<script>
  const logEl = document.getElementById("log");
  document.getElementById("origin").textContent = location.origin;

  function log(msg, cls) {
    const time = new Date().toISOString().slice(11, 23);
    const line = `[${time}] ${msg}`;
    const span = document.createElement("span");
    if (cls) span.className = cls;
    span.textContent = line + "\n";
    logEl.appendChild(span);
    logEl.scrollTop = logEl.scrollHeight;
    console.log(line);
  }

  document.getElementById("btn-clear").onclick = () => { logEl.textContent = ""; };

  // Persist the last credential id across button clicks.
  let lastCredId = null;

  function bytesToB64Url(buf) {
    const u8 = new Uint8Array(buf);
    let s = "";
    for (let i = 0; i < u8.length; i++) s += String.fromCharCode(u8[i]);
    return btoa(s).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }

  function b64UrlToBytes(s) {
    s = s.replace(/-/g, "+").replace(/_/g, "/");
    while (s.length % 4) s += "=";
    const bin = atob(s);
    const u = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
    return u;
  }

  function randomBytes(n) {
    const u = new Uint8Array(n);
    crypto.getRandomValues(u);
    return u;
  }

  document.getElementById("btn-create").onclick = async () => {
    try {
      const challenge = randomBytes(32);
      const userId = randomBytes(16);
      const options = {
        challenge,
        rp: { id: "localhost", name: "PW YubiKey Relay Demo" },
        user: { id: userId, name: "demo@parallel.works", displayName: "Demo User" },
        pubKeyCredParams: [
          { type: "public-key", alg: -7 },   // ES256
          { type: "public-key", alg: -257 }, // RS256
        ],
        timeout: 90000,
        authenticatorSelection: { userVerification: "discouraged" },
        attestation: "direct",
      };
      log(`create() rp=${options.rp.id} challenge=${bytesToB64Url(challenge).slice(0, 16)}... — TOUCH YOUR LAPTOP YUBIKEY`);
      const t0 = performance.now();
      const cred = await navigator.credentials.create({ publicKey: options });
      const dt = (performance.now() - t0).toFixed(1);
      lastCredId = new Uint8Array(cred.rawId);
      log(`create() OK in ${dt} ms`, "ok");
      log(`  id           = ${cred.id}`);
      log(`  rawId.length = ${lastCredId.length}`);
      log(`  type         = ${cred.type}`);
      log(`  clientDataJSON = ${new TextDecoder().decode(cred.response.clientDataJSON)}`);
      log(`  attestationObject.length = ${cred.response.attestationObject.byteLength}`);
      log(`  attestationObject (b64url 1st 80) = ${bytesToB64Url(cred.response.attestationObject).slice(0, 80)}...`);
      document.getElementById("btn-get").disabled = false;
    } catch (err) {
      log(`create() FAILED: ${err && err.name}: ${err && err.message}`, "err");
      console.error(err);
    }
  };

  document.getElementById("btn-get").onclick = async () => {
    if (!lastCredId) {
      log("no credential to assert against; run create() first", "err");
      return;
    }
    try {
      const challenge = randomBytes(32);
      const options = {
        challenge,
        rpId: location.hostname || "demo.parallel.works",
        allowCredentials: [{ type: "public-key", id: lastCredId }],
        timeout: 90000,
        userVerification: "discouraged",
      };
      log(`get() rpId=${options.rpId} — TOUCH YOUR LAPTOP YUBIKEY`);
      const t0 = performance.now();
      const assertion = await navigator.credentials.get({ publicKey: options });
      const dt = (performance.now() - t0).toFixed(1);
      log(`get() OK in ${dt} ms`, "ok");
      log(`  id                = ${assertion.id}`);
      log(`  authenticatorData = ${bytesToB64Url(assertion.response.authenticatorData).slice(0, 80)}...`);
      log(`  signature         = ${bytesToB64Url(assertion.response.signature).slice(0, 80)}...`);
      log(`  signature.length  = ${assertion.response.signature.byteLength}`);
      log(`  userHandle        = ${assertion.response.userHandle ? bytesToB64Url(assertion.response.userHandle) : "null"}`);
    } catch (err) {
      log(`get() FAILED: ${err && err.name}: ${err && err.message}`, "err");
      console.error(err);
    }
  };

  log("ready. extension must be installed and chrome.webAuthenticationProxy.attach() must have succeeded.");
</script>
</body>
</html>
