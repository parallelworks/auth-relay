# yaml-language-server: $schema=https://activate.parallel.works/workflow.schema.json
---
#
# Parallel Works Auth Relay — ACTIVATE bootstrap workflow
#
# What it does
#   Runs on a user-selected remote resource (the same one they intend to
#   open a VDI desktop on) and brings up everything the auth-relay needs
#   on that side:
#
#     1. clones (or updates) this repo at $RELAY_DIR
#     2. installs a portable Google Chrome under $RELAY_DIR if neither
#        $PW_CHROME_BIN nor a pre-extracted chrome-portable is found
#     3. runs vdi/bootstrap.sh — writes the NMH manifest into Chrome's
#        config dir, drops a Desktop launcher icon, seeds the bookmarks
#        bar, starts the localhost:8080 test-page http.server
#     4. (optional) runs vdi/install-extension.py — auto-detects the
#        user's running Xvnc/Xkasmvnc, launches Chrome inside that
#        display, loads the extension via the DevTools Protocol
#
# What it does NOT do
#   The laptop side. The user still needs to run, on their laptop:
#     ./pwrelay setup           # one-time
#     ./pwrelay up <resource>   # this same resource
#   The workflow's final step prints those instructions in the log.
#
# Prerequisites on the resource:
#   - a running VDI / desktop session (otherwise Chrome has nowhere to
#     render). install-extension.py prints a clear warning if no VNC
#     server is found owned by the current user.
#   - outbound HTTPS to dl.google.com (only on first run; we extract
#     the official Chrome RPM with rpm2cpio).
#   - python3 (any version >= 3.6); the helper scripts will pick up
#     python3.12/3.11/3.10/... if available, otherwise fail clean.

permissions:
  - "*"

sessions:
  testpage:
    useTLS: false
    redirect: false
    useCustomDomain: false
    prompt-for-name:
      default: auth_relay_test

on:
  execute:
    inputs:
      install_location:
        type: dropdown
        label: Install location
        default: home
        tooltip: |
          Where to put the relay code + portable Chrome (~340 MB).
          See docs/hpc.md for the trade-offs.
        options:
          - label: $HOME/auth-relay  (default; survives reboot)
            value: home
          - label: /tmp/$USER/auth-relay  (no quota hit; per-node, lost on reboot)
            value: tmp
          - label: Use existing  (already installed somewhere else)
            value: existing
      custom_relay_dir:
        type: string
        label: Custom RELAY_DIR
        default: ""
        hidden: ${{ inputs.install_location != 'existing' }}
        tooltip: |
          Absolute path to an existing auth-relay checkout, e.g.
          /contrib/<project>/auth-relay. Leave blank to default to
          $HOME/auth-relay.
      branch:
        type: string
        label: Git branch / tag
        default: main
        tooltip: Branch or tag of parallelworks/auth-relay to check out
      seed_bookmarks:
        type: boolean
        label: Seed bookmarks bar
        default: true
        tooltip: Pre-populate Chrome bookmarks (Gmail, SSO, NOAA RDHPCS, ...)
      auto_launch_chrome:
        type: boolean
        label: Auto-launch Chrome inside the VDI
        default: true
        tooltip: |
          Run vdi/install-extension.py after bootstrap. Will auto-detect
          your running Xvnc/Xkasmvnc and pop Chrome into that display.
          Disable if you only want the NMH and Desktop launcher staged.
      test_page_port:
        type: number
        label: Test-page HTTP port
        default: 8080
        tooltip: |
          Port for the local-RP test page (vdi/test.html). The test page
          itself is rendered by the in-VDI Chrome; this also gets
          exposed as an ACTIVATE session below for convenience.

jobs:
  bootstrap:
    steps:
      - name: Resolve RELAY_DIR
        env:
          INSTALL_LOCATION: ${{ inputs.install_location }}
          CUSTOM_DIR: ${{ inputs.custom_relay_dir }}
        run: |
          set -e
          case "$INSTALL_LOCATION" in
            home)
              RELAY_DIR="$HOME/auth-relay"
              ;;
            tmp)
              RELAY_DIR="/tmp/$USER/auth-relay"
              mkdir -p "$(dirname "$RELAY_DIR")"
              ;;
            existing)
              if [[ -n "$CUSTOM_DIR" ]]; then
                RELAY_DIR="$CUSTOM_DIR"
              else
                RELAY_DIR="$HOME/auth-relay"
              fi
              if [[ ! -d "$RELAY_DIR" ]]; then
                echo "ERROR: 'Use existing' selected but $RELAY_DIR does not exist" >&2
                exit 1
              fi
              ;;
            *)
              RELAY_DIR="$HOME/auth-relay"
              ;;
          esac
          echo "RELAY_DIR=$RELAY_DIR"
          echo "RELAY_DIR=$RELAY_DIR" >> "$GITHUB_ENV"

      - name: Clone or update the repo
        if: ${{ inputs.install_location != 'existing' }}
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          set -e
          if [[ -d "$RELAY_DIR/.git" ]]; then
            echo "==> updating existing checkout at $RELAY_DIR"
            cd "$RELAY_DIR"
            git fetch --quiet origin "$BRANCH"
            git checkout --quiet "$BRANCH"
            git reset --hard "origin/$BRANCH"
          else
            echo "==> cloning into $RELAY_DIR (branch=$BRANCH)"
            rm -rf "$RELAY_DIR"
            git clone --quiet --branch "$BRANCH" \
              https://github.com/parallelworks/auth-relay "$RELAY_DIR"
          fi
          (cd "$RELAY_DIR" && git rev-parse --short HEAD)

      - name: Install portable Chrome (only if not already present)
        if: ${{ inputs.install_location != 'existing' }}
        run: |
          set -e
          CHROME_LOCAL="$RELAY_DIR/chrome-portable/opt/google/chrome/google-chrome"
          if [[ -x "$CHROME_LOCAL" ]]; then
            echo "Chrome already installed: $($CHROME_LOCAL --version)"
          elif [[ -n "${PW_CHROME_BIN:-}" && -x "$PW_CHROME_BIN" ]]; then
            echo "Using PW_CHROME_BIN=$PW_CHROME_BIN ($($PW_CHROME_BIN --version))"
          elif command -v google-chrome >/dev/null 2>&1; then
            echo "Using system google-chrome ($(google-chrome --version))"
          else
            echo "==> installing portable Chrome under $RELAY_DIR"
            bash "$RELAY_DIR/vdi/install-chrome.sh" "$RELAY_DIR"
          fi

      - name: Run vdi/bootstrap.sh
        run: |
          set -e
          bash "$RELAY_DIR/vdi/bootstrap.sh"

      - name: Optionally clear bookmarks if user opted out
        if: ${{ !inputs.seed_bookmarks }}
        run: |
          set -e
          # bootstrap.sh always seeds bookmarks if the Chrome Bookmarks
          # file doesn't already exist. If the operator unchecked the
          # box, drop the seeded file so Chrome starts with none.
          BM="$HOME/.config/google-chrome/Default/Bookmarks"
          if [[ -f "$BM" ]]; then
            # Only remove if it looks like our seeded set (contains the
            # test page URL); never blow away a user's curated bookmarks.
            if grep -q 'localhost:8080/test.html' "$BM" 2>/dev/null; then
              rm -f "$BM"
              echo "removed seeded bookmarks (user opted out)"
            fi
          fi

      - name: Auto-launch Chrome + load extension
        if: ${{ inputs.auto_launch_chrome }}
        run: |
          set -e
          PY=""
          for cand in python3.12 python3.11 python3.10 python3.9 python3.8 python3.7 python3; do
            if command -v "$cand" >/dev/null 2>&1 \
               && "$cand" -c 'import sys; sys.exit(0 if sys.version_info >= (3, 7) else 1)' >/dev/null 2>&1; then
              PY="$(command -v "$cand")"
              break
            fi
          done
          if [[ -z "$PY" ]]; then
            echo "ERROR: no Python >= 3.7 on PATH; cannot run install-extension.py" >&2
            exit 1
          fi
          echo "==> $PY $RELAY_DIR/vdi/install-extension.py"
          "$PY" "$RELAY_DIR/vdi/install-extension.py" \
              --ext-dir "$RELAY_DIR/vdi/extension" \
              || {
                rc=$?
                echo "install-extension.py exited rc=$rc — see /tmp/pw-chrome-$USER.log if Chrome launched but failed"
                exit "$rc"
              }

      - name: Print laptop-side next steps
        run: |
          cat <<EOF

          ============================================================
           VDI-side bootstrap done. To finish from your LAPTOP:

             git clone https://github.com/parallelworks/auth-relay
             cd auth-relay
             ./pwrelay setup            # one-time per laptop
             ./pwrelay up <this-resource>   # each session

           Then in the Chrome window that opened in your VDI:
             - Open https://accounts.google.com / your SSO portal
             - Touch your laptop YubiKey when prompted
          ============================================================
          EOF

  testpage_session:
    steps:
      - name: Wait for the local test-page server
        early-cancel: any-job-failed
        env:
          host: localhost
          port: ${{ inputs.test_page_port }}
        retry:
          interval: 3s
          max-retries: 100
          timeout: 5s
        run: curl --fail --silent "http://${host}:${port}/test.html" >/dev/null 2>&1

      - name: Expose test page as an ACTIVATE session
        uses: parallelworks/update-session
        with:
          remotePort: ${{ inputs.test_page_port }}
          name: ${{ sessions.testpage }}
          status: "running"
          target: "user-workspace"
